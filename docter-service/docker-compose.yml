services:
  doctor-service:
    build: .
    container_name: doctor-service
    env_file:
      - .env
    ports:
      - "8010:8010"
    depends_on:
      - mysql
    command: uvicorn app.main:app --host 0.0.0.0 --port 8010 --reload
    volumes:
      - ./:/app
      - /app/.venv

  mysql:
    image: mysql:8.4
    container_name: doctor-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: doctor_db
    ports:
      - "3307:3306"
    volumes:
      - doctor_mysql_data:/var/lib/mysql

volumes:
  doctor_mysql_data:
